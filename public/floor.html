<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pagariya Auto — Floor Display</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #CC1E12;
    --green:  #4CAF1A;
    --page:   #121212;
    --card:   #1E1E1E;
    --border: #2E2E2E;
    --text:   #FFFFFF;
    --text2:  #B0B0B0;
    --text3:  #777777;
    --sf: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--sf); background: var(--page); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }

  .topbar {
    padding: 18px 28px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar-brand { font-size: 26px; font-weight: 800; color: var(--red); letter-spacing: 0.04em; }
  .topbar-sub { font-size: 13px; color: var(--green); letter-spacing: .14em; text-transform: uppercase; font-weight: 600; margin-top: 2px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .live-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .clock { font-size: 22px; font-weight: 700; font-family: 'Courier New', monospace; }

  .floor-grid {
    flex: 1; overflow-y: auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr));
    gap: 18px; padding: 22px 28px 36px; align-content: start;
  }

  .floor-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 6px 24px rgba(0,0,0,.4);
  }
  .floor-card.overtime { border-color: rgba(204,30,18,.6); box-shadow: 0 0 0 2px rgba(204,30,18,.35); }

  .floor-card-body { padding: 22px 22px 16px; flex: 1; }
  .floor-job-number {
    font-size: 14px; font-weight: 700; color: var(--text3);
    letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px;
  }
  .floor-car-model { font-size: 26px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.15; }
  .floor-car-plate { font-size: 14px; color: var(--text2); font-family: 'Courier New', monospace; margin-top: 4px; letter-spacing: .04em; }

  .floor-meta-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px; }
  .floor-mechanic-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
  .floor-mechanic-name { font-size: 19px; font-weight: 700; margin-top: 3px; }
  .floor-elapsed { font-size: 32px; font-weight: 800; font-family: 'Courier New', monospace; text-align: right; }
  .floor-elapsed.overtime { color: var(--red); }
  .floor-stage-badge {
    display: inline-block; margin-top: 12px; font-size: 12px; font-weight: 700;
    padding: 5px 12px; border-radius: 20px; background: rgba(76,175,26,.16); color: var(--green);
    letter-spacing: .03em; text-transform: uppercase;
  }
  .floor-stage-badge.washing { background: rgba(46,158,255,.16); color: #2E9EFF; }

  .floor-actions { display: flex; }
  .floor-btn {
    flex: 1; padding: 26px 12px; border: none; font-size: 20px; font-weight: 800;
    letter-spacing: .06em; cursor: pointer; font-family: var(--sf);
    transition: opacity .12s; -webkit-tap-highlight-color: transparent;
  }
  .floor-btn:active { opacity: .75; }
  .floor-btn-start { background: var(--green); color: #fff; }
  .floor-btn-done  { background: var(--red); color: #fff; }

  .section-title {
    grid-column: 1/-1; font-size: 13px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: .1em; margin: 4px 0 -6px;
  }

  .empty-state {
    grid-column: 1/-1; text-align: center; padding: 100px 20px; color: var(--text3);
  }
  .empty-icon { font-size: 56px; margin-bottom: 18px; }
  .empty-title { font-size: 22px; font-weight: 700; color: var(--text2); }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-brand">PAGARIYA AUTO — FLOOR DISPLAY</div>
    <div class="topbar-sub">Tap Start to begin · Tap Done to advance</div>
  </div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="floor-grid" id="floorGrid"></div>

<script>
// This kiosk is shared by technicians, electricians, denters and washers —
// there's no per-worker login, so it shows every job currently sitting with
// a specialist ('assigned'/'in_progress') or waiting to be washed
// ('billing_washing' with washing not yet done), and any floor worker can
// act on any card.
const SPECIALIST_STAGE_LABELS = { assigned: 'Assigned — Tap Start', in_progress: 'In Progress — Tap Done' };
const SPECIALIST_ROLE_LABELS = { technician: 'Technician', electrician: 'Electrician', denter: 'Denter' };

let jobs = [];

function parseDbDate(dateStr) {
  return new Date(dateStr.replace(' ', 'T') + 'Z');
}
function minutesSince(dateStr) {
  return (Date.now() - parseDbDate(dateStr).getTime()) / 60000;
}
function formatElapsed(dateStr) {
  const totalMin = Math.floor(minutesSince(dateStr));
  if (totalMin < 60) return totalMin + 'm';
  const h = Math.floor(totalMin / 60), m = totalMin % 60;
  return h + 'h ' + (m > 0 ? m + 'm' : '');
}

async function patchJob(jobId, path, body) {
  await fetch(`/api/jobs/${jobId}/${path}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person: 'Floor Kiosk', ...body }),
  });
  loadJobs();
}

function startRepair(jobId) { patchJob(jobId, 'floor-start'); }
function doneRepair(jobId)  { patchJob(jobId, 'floor-done'); }
function doneWashing(jobId) { patchJob(jobId, 'washing-done'); }

function renderSpecialistCard(job) {
  const overtime = minutesSince(job.updated_at) > 90;
  const card = document.createElement('div');
  card.className = 'floor-card' + (overtime ? ' overtime' : '');
  const roleLabel = SPECIALIST_ROLE_LABELS[job.specialist_role] || 'Specialist';
  card.innerHTML = `
    <div class="floor-card-body">
      <div class="floor-job-number">#${job.job_number} · ${roleLabel}</div>
      <div class="floor-car-model">${job.car_model || 'Unknown Car'}</div>
      <div class="floor-car-plate">${job.car_number}</div>
      <div class="floor-stage-badge">${SPECIALIST_STAGE_LABELS[job.current_stage] || job.current_stage}</div>
      <div class="floor-meta-row">
        <div>
          <div class="floor-mechanic-label">${roleLabel}</div>
          <div class="floor-mechanic-name">${job.assigned_mechanic || 'Unassigned'}</div>
        </div>
        <div class="floor-elapsed${overtime ? ' overtime' : ''}">${formatElapsed(job.created_at)}</div>
      </div>
    </div>
    <div class="floor-actions">
      ${job.current_stage === 'assigned'
        ? `<button class="floor-btn floor-btn-start">START</button>`
        : `<button class="floor-btn floor-btn-done">DONE</button>`}
    </div>`;
  const startBtn = card.querySelector('.floor-btn-start');
  const doneBtn = card.querySelector('.floor-btn-done');
  if (startBtn) startBtn.addEventListener('click', () => startRepair(job.id));
  if (doneBtn) doneBtn.addEventListener('click', () => doneRepair(job.id));
  return card;
}

function renderWashingCard(job) {
  const overtime = minutesSince(job.updated_at) > 90;
  const card = document.createElement('div');
  card.className = 'floor-card' + (overtime ? ' overtime' : '');
  card.innerHTML = `
    <div class="floor-card-body">
      <div class="floor-job-number">#${job.job_number} · Washing</div>
      <div class="floor-car-model">${job.car_model || 'Unknown Car'}</div>
      <div class="floor-car-plate">${job.car_number}</div>
      <div class="floor-stage-badge washing">Ready for Washing</div>
      <div class="floor-meta-row">
        <div>
          <div class="floor-mechanic-label">Billing</div>
          <div class="floor-mechanic-name">${job.billing_done ? 'Done' : 'Pending'}</div>
        </div>
        <div class="floor-elapsed${overtime ? ' overtime' : ''}">${formatElapsed(job.created_at)}</div>
      </div>
    </div>
    <div class="floor-actions">
      <button class="floor-btn floor-btn-done">DONE</button>
    </div>`;
  card.querySelector('.floor-btn-done').addEventListener('click', () => doneWashing(job.id));
  return card;
}

function renderGrid() {
  const grid = document.getElementById('floorGrid');
  grid.innerHTML = '';

  const repairJobs = jobs.filter(j => j.current_stage === 'assigned' || j.current_stage === 'in_progress');
  const washingJobs = jobs.filter(j => j.current_stage === 'billing_washing' && !j.washing_done);

  if (repairJobs.length === 0 && washingJobs.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎉</div>
      <div class="empty-title">No active jobs right now</div>
    </div>`;
    return;
  }

  if (repairJobs.length) {
    grid.insertAdjacentHTML('beforeend', `<div class="section-title">Repair Floor</div>`);
    for (const job of repairJobs) grid.appendChild(renderSpecialistCard(job));
  }
  if (washingJobs.length) {
    grid.insertAdjacentHTML('beforeend', `<div class="section-title">Washing Bay</div>`);
    for (const job of washingJobs) grid.appendChild(renderWashingCard(job));
  }
}

async function loadJobs() {
  try {
    const res = await fetch('/api/jobs');
    jobs = await res.json();
    renderGrid();
  } catch (e) { console.error(e); }
}

function tickClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour12: false });
}

loadJobs();
tickClock();
setInterval(tickClock, 1000);
setInterval(loadJobs, 8000);
</script>
</body>
</html>
